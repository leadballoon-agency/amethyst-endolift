<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Amethyst gradient background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#4a2c6e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b3fa0;stop-opacity:1" />
    </linearGradient>

    <!-- Gold accent -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a855;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0d48a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a855;stop-opacity:1" />
    </linearGradient>

    <!-- Shimmer overlay -->
    <radialGradient id="shimmer" cx="30%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>

    <!-- Soft glow -->
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="url(#bgGrad)"/>
  <rect width="600" height="600" fill="url(#shimmer)"/>

  <!-- Decorative diamond pattern (subtle) -->
  <g opacity="0.04" fill="white">
    <rect x="140" y="140" width="20" height="20" transform="rotate(45 150 150)"/>
    <rect x="440" y="140" width="20" height="20" transform="rotate(45 450 150)"/>
    <rect x="140" y="440" width="20" height="20" transform="rotate(45 150 450)"/>
    <rect x="440" y="440" width="20" height="20" transform="rotate(45 450 450)"/>
  </g>

  <!-- Top gold line -->
  <rect x="100" y="70" width="400" height="1.5" fill="url(#goldGrad)" opacity="0.6" rx="0.75"/>

  <!-- Corner accents -->
  <path d="M60 60 L100 60 L100 62 L62 62 L62 100 L60 100 Z" fill="url(#goldGrad)" opacity="0.4"/>
  <path d="M540 60 L500 60 L500 62 L538 62 L538 100 L540 100 Z" fill="url(#goldGrad)" opacity="0.4"/>
  <path d="M60 540 L100 540 L100 538 L62 538 L62 500 L60 500 Z" fill="url(#goldGrad)" opacity="0.4"/>
  <path d="M540 540 L500 540 L500 538 L538 538 L538 500 L540 500 Z" fill="url(#goldGrad)" opacity="0.4"/>

  <!-- Camera icon -->
  <g transform="translate(300, 155)" opacity="0.9">
    <rect x="-28" y="-14" width="56" height="38" rx="6" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <circle cx="0" cy="5" r="10" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <rect x="-8" y="-18" width="16" height="6" rx="2" fill="none" stroke="url(#goldGrad)" stroke-width="1.2"/>
  </g>

  <!-- Small decorative line -->
  <rect x="260" y="195" width="80" height="1" fill="url(#goldGrad)" opacity="0.4" rx="0.5"/>

  <!-- MODELS heading -->
  <text x="300" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="400" fill="white" text-anchor="middle" letter-spacing="12" filter="url(#textShadow)">
    MODELS
  </text>

  <!-- WANTED subheading -->
  <text x="300" y="285" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="300" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="6">
    WANTED
  </text>

  <!-- Divider -->
  <rect x="220" y="310" width="160" height="1" fill="url(#goldGrad)" opacity="0.5" rx="0.5"/>

  <!-- Pricing -->
  <g font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="300" y="350" font-size="14" fill="white" opacity="0.7" letter-spacing="1">
      FACE &amp; NECK FROM £450
    </text>
    <text x="300" y="375" font-size="14" fill="white" opacity="0.7" letter-spacing="1">
      BODY AREAS FROM £300
    </text>
  </g>

  <!-- Divider -->
  <rect x="240" y="400" width="120" height="1" fill="url(#goldGrad)" opacity="0.3" rx="0.5"/>

  <!-- Requirement line -->
  <text x="300" y="435" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="white" text-anchor="middle" opacity="0.55" letter-spacing="1">
    PHOTOS • FILMING • 6 MONTH FOLLOW-UP
  </text>

  <!-- Apply Now button -->
  <g transform="translate(300, 490)">
    <rect x="-90" y="-22" width="180" height="44" rx="22" fill="none" stroke="url(#goldGrad)" stroke-width="1.5"/>
    <rect x="-88" y="-20" width="176" height="40" rx="20" fill="white" opacity="0.08"/>
    <text x="0" y="6" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" fill="url(#goldGrad)" text-anchor="middle" letter-spacing="3">
      APPLY NOW
    </text>
  </g>

  <!-- Bottom gold line -->
  <rect x="100" y="530" width="400" height="1.5" fill="url(#goldGrad)" opacity="0.6" rx="0.75"/>
</svg>
